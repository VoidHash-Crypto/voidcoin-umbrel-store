version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: bch2-apps-forge-pool_web_1
      APP_PORT: 80

  web:
    image: ghcr.io/bitcoincashii/forge-pool-web:latest
    restart: on-failure
    depends_on:
      - api
    environment:
      API_URL: http://api:8080

  api:
    image: ghcr.io/bitcoincashii/forge-pool-api:latest
    restart: on-failure
    depends_on:
      - node
      - postgres
      - redis
    ports:
      - "127.0.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      DATA_DIR: /data
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: forge
      DB_PASSWORD: moneyprintergobrrr
      DB_NAME: forgepool
      REDIS_URL: redis://redis:6379
      RPC_HOST: node
      RPC_PORT: "8342"
      RPC_USER: umbrel
      RPC_PASSWORD: moneyprintergobrrr
      STRATUM_INTERNAL_URL: http://host.docker.internal:3337
      INTERNAL_API_TOKEN: "31544b74955d2def57570ecf68d95113a0260cda15dc04ec3c55336a4c0c98de"
      CORS_ORIGINS: "*"

  stratum:
    image: ghcr.io/bitcoincashii/forge-pool-stratum:latest
    restart: on-failure
    network_mode: host
    depends_on:
      - api
      - node
      - postgres
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ./configs/stratum.yaml:/configs/config.yaml:ro
    environment:
      DATA_DIR: /data
      API_HOST: 127.0.0.1
      API_PORT: "8080"
      API_URL: http://127.0.0.1:8080
      RPC_HOST: 127.0.0.1
      RPC_PORT: "8342"
      RPC_USER: umbrel
      RPC_PASSWORD: moneyprintergobrrr
      DB_HOST: 127.0.0.1
      DB_PORT: "5433"
      DB_USER: forge
      DB_PASSWORD: moneyprintergobrrr
      DB_NAME: forgepool
      INTERNAL_API_TOKEN: "31544b74955d2def57570ecf68d95113a0260cda15dc04ec3c55336a4c0c98de"
      ZMQ_ENDPOINT: tcp://127.0.0.1:28332

  node:
    image: ghcr.io/bitcoincashii/forge-pool-node:latest
    restart: on-failure
    stop_grace_period: 1m
    ports:
      - "127.0.0.1:8342:8342"
      - "127.0.0.1:28332:28332"
      - "8339:8339"
    volumes:
      - ${APP_DATA_DIR}/node:/root/.bch2
    command:
      - -printtoconsole
      - -server=1
      - -listen=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=umbrel
      - -rpcpassword=moneyprintergobrrr
      - -zmqpubhashblock=tcp://0.0.0.0:28332

  postgres:
    image: postgres:15-alpine
    restart: on-failure
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: moneyprintergobrrr
      POSTGRES_DB: forgepool
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/redis:/data

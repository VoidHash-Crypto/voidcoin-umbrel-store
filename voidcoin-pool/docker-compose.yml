version: "3.7"
services:
  node:
    image: ghcr.io/voidhash-crypto/voidcoin-pool-node:latest
    container_name: voidcoin-pool-node
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/node:/root/.voidcoin
    command:
      - -printtoconsole
      - -prune=1000
      - -server=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=voidrpc
      - -rpcpassword=voidpoolrpc2024
      - -zmqpubhashblock=tcp://0.0.0.0:28332
      - -zmqpubrawblock=tcp://0.0.0.0:28332
    networks:
      - voidcoin_pool

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: voidcoin-pool-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: voidpool
      POSTGRES_PASSWORD: voidpooldb2024
      POSTGRES_DB: voidpool
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data
    networks:
      - voidcoin_pool

  redis:
    image: redis:7-alpine
    container_name: voidcoin-pool-redis
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/redis:/data
    networks:
      - voidcoin_pool

  api:
    image: ghcr.io/voidhash-crypto/voidcoin-pool-api:latest
    container_name: voidcoin-pool-api
    restart: unless-stopped
    depends_on:
      - node
      - postgres
      - redis
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=voidpool
      - DB_PASSWORD=voidpooldb2024
      - DB_NAME=voidpool
      - REDIS_URL=redis://redis:6379
      - RPC_HOST=node
      - RPC_PORT=7778
      - RPC_USER=voidrpc
      - RPC_PASSWORD=voidpoolrpc2024
      - POOL_NAME=My Void Pool
      - POOL_FEE=1.0
      - SOLO_FEE=0.5
      - MIN_PAYOUT=5
    networks:
      - voidcoin_pool

  stratum:
    image: ghcr.io/voidhash-crypto/voidcoin-pool-stratum:latest
    container_name: voidcoin-pool-stratum
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3333:3333"
    environment:
      - API_URL=http://api:8080
      - RPC_HOST=node
      - RPC_PORT=7778
      - RPC_USER=voidrpc
      - RPC_PASSWORD=voidpoolrpc2024
      - POOL_FEE=1.0
      - ZMQ_ENDPOINT=tcp://node:28332
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=voidpool
      - DB_PASSWORD=voidpooldb2024
      - DB_NAME=voidpool
      - POOL_ADDRESS=${POOL_ADDRESS:-}
    networks:
      - voidcoin_pool

  web:
    image: ghcr.io/voidhash-crypto/voidcoin-pool-web:latest
    container_name: voidcoin-pool-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${APP_PORT:-3080}:80"
    environment:
      - API_URL=http://api:8080
    networks:
      - voidcoin_pool

networks:
  voidcoin_pool:
    driver: bridge
